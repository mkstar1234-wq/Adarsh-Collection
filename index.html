<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Adarsh Collection - Smart Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --primary: #e11d48;
            --primary-gradient: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --whatsapp: #25D366;
            --danger: #ef4444;
            --warning: #f59e0b;
            --blue: #3b82f6;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            --radius: 12px;
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: 40px; 
            -webkit-font-smoothing: antialiased;
        }
        
        .header { 
            background: var(--primary-gradient); 
            color: white; 
            padding: 16px 20px; 
            display: flex;
            align-items: center;
            position: relative;
            box-shadow: var(--shadow-md); 
        }
        
        .admin-header-btn {
            position: absolute;
            top: 50%;            left: 16px;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }
        
        .admin-header-btn:hover { background: rgba(255, 255, 255, 0.25); }
        .admin-header-btn.active { background: white; color: var(--primary); box-shadow: var(--shadow-sm); }
        
        .header-content {
            flex: 1;
            text-align: center;
            padding: 0 70px;
        }
        
        .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 4px; }
        .header a { color: #fecdd3; text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
        .header a:hover { color: white; }

        @media (max-width: 400px) {
            .header-content { padding: 0 60px; }
            .header h1 { font-size: 18px; }
            .admin-header-btn { padding: 6px 10px; font-size: 12px; left: 10px; }
        }
        
        .switcher { 
            display: flex; 
            margin: 20px 16px; 
            background: #e2e8f0; 
            border-radius: 10px; 
            padding: 4px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        
        .switcher button { 
            flex: 1; 
            padding: 10px; 
            border: none;             font-weight: 600; 
            font-size: 14px; 
            color: var(--muted);
            background: transparent;
            border-radius: 8px;
            cursor: pointer; 
            transition: all 0.2s ease; 
            font-family: inherit;
            white-space: normal; 
            word-wrap: break-word; 
            line-height: 1.4;
        }
        
        .switcher button.active { 
            background: white; 
            color: var(--primary); 
            box-shadow: var(--shadow-sm);
        }
        
        .section { display: none; padding: 0 16px; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .admin-card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: var(--radius); 
            box-shadow: var(--shadow-md); 
            margin-bottom: 20px; 
            border: 1px solid #f1f5f9;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .admin-card:hover { box-shadow: var(--shadow-lg); }
        
        .admin-card h3 { 
            margin-bottom: 16px; 
            color: var(--text); 
            font-size: 16px; 
            font-weight: 700;
            border-bottom: 1px solid #f1f5f9; 
            padding-bottom: 12px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group { margin-bottom: 16px; }
                .form-group label { 
            display: block; 
            margin-bottom: 6px; 
            font-size: 12px; 
            font-weight: 600; 
            color: var(--muted); 
            letter-spacing: 0.05em; 
            text-transform: uppercase; 
        }
        
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 12px 14px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 14px; 
            color: var(--text);
            background: #f8fafc;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.1);
        }
        
        .action-btn { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary-gradient); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 15px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(225, 29, 72, 0.2);
            font-family: inherit;
        }
        
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 8px -1px rgba(225, 29, 72, 0.3); }
        .action-btn:active { transform: translateY(0); }

        .load-more-btn { 
            width: 100%; 
            padding: 14px;             background: white; 
            color: var(--primary); 
            border: 1px solid var(--primary); 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 24px; 
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .load-more-btn:hover { background: #fff1f2; transform: translateY(-1px); }

        .btn-group { display: flex; gap: 8px; justify-content: center; width: 100%; margin-top: 12px; }
        
        .edit-btn { 
            background: #fffbeb; 
            color: #b45309; 
            border: 1px solid #fcd34d; 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            flex: 1; 
            transition: all 0.2s; 
            font-family: inherit; 
        }
        .edit-btn:hover { background: #fef3c7; }
        
        .delete-btn { 
            background: #fef2f2; 
            color: var(--danger); 
            border: 1px solid #fecaca; 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            flex: 1; 
            transition: all 0.2s; 
            font-family: inherit; 
        }
        .delete-btn:hover { background: #fee2e2; }
        
        .whatsapp-btn { 
            background: var(--whatsapp); 
            color: white; 
            border: none; 
            padding: 10px 12px;             border-radius: 8px; 
            font-weight: 600; 
            font-size: 13px; 
            cursor: pointer; 
            width: calc(100% - 24px); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            margin: 12px auto 0; 
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(37, 211, 102, 0.2);
            font-family: inherit;
        }
        
        .whatsapp-btn:hover { background: #20bd5a; transform: translateY(-1px); }
        
        .filters { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            padding-bottom: 12px; 
            margin-bottom: 16px; 
        }
        
        .filters::-webkit-scrollbar { display: none; }
        
        .filters button { 
            width: 100%; 
            padding: 8px 4px; 
            border: 1px solid #e2e8f0; 
            background: white; 
            color: var(--muted); 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 13px;
            transition: all 0.2s ease;
            font-family: inherit;
            white-space: normal; 
            word-wrap: break-word; 
            line-height: 1.2; 
        }
        
        .filters button:hover { border-color: var(--primary); color: var(--primary); }
        
        .filters button.active-filter { 
            background: var(--primary-gradient); 
            color: white; 
            border-color: transparent;
            box-shadow: 0 2px 4px rgba(225, 29, 72, 0.2);
        }        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .product-card { 
            background: white; 
            border-radius: var(--radius); 
            overflow: hidden; 
            box-shadow: var(--shadow-sm); 
            border: 1px solid #f1f5f9;
            text-align: center; 
            padding-bottom: 16px; 
            position: relative; 
            transition: all 0.2s ease;
        }
        
        .product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        
        .product-card img { 
            width: 100%; 
            height: 160px; 
            object-fit: contain; 
            background: #f8fafc; 
            cursor: pointer; 
            transition: transform 0.3s ease;
        }
        
        .product-card:hover img { transform: scale(1.03); }
        
        .id-label { 
            font-size: 11px; 
            color: var(--primary); 
            margin-top: 10px; 
            font-weight: 700; 
            background: #fff1f2; 
            display: inline-block; 
            padding: 4px 10px; 
            border-radius: 12px; 
            letter-spacing: 0.05em;
        }
        
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%;             height: 100%; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(8px);
            padding: 20px; 
            align-items: center; 
            justify-content: center; 
            animation: fadeIn 0.2s forwards;
        }
        
        .modal img { max-width: 100%; max-height: 90vh; object-fit: contain; border-radius: 8px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        
        .close-modal { position: absolute; top: 20px; right: 24px; color: white; font-size: 32px; font-weight: 300; cursor: pointer; transition: transform 0.2s; line-height: 1; }
        .close-modal:hover { transform: scale(1.1); }

        .empty-msg { text-align: center; color: var(--muted); margin-top: 40px; grid-column: 1 / -1; font-size: 14px; font-weight: 500; }
        
        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        
        .tag-item { 
            background: #f1f5f9; 
            color: var(--text);
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: 500;
            display: flex; 
            align-items: center; 
            gap: 8px; 
            border: 1px solid #e2e8f0;
        }
        
        .tag-item span { 
            color: var(--danger); 
            font-weight: bold; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fee2e2;
            font-size: 11px;
            transition: all 0.2s;
        }
        
        .tag-item span:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>
    <div class="header">
        <button id="btnAdmin" class="admin-header-btn" onclick="verifyAdmin()">🔒 Admin</button>
        <div class="header-content">
            <h1 id="displayShopName">Adarsh Collection</h1>
            <a id="displayLocationUrl" href="#" target="_blank">📍 View Shop Location</a>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img id="modalImg" src="">
    </div>

    <div class="switcher">
        <button id="btnCustomer" class="active" onclick="switchMode('customer')">Customer View</button>
    </div>

    <div id="customerSection" class="section active">
        <div class="filters" id="customerFilters"></div>
        <div class="product-grid" id="productGrid">
            <div class="empty-msg">Loading products...</div>
        </div>
        <button id="loadMoreBtn" class="load-more-btn" style="display:none;" onclick="loadMore()">Load More</button>
    </div>

    <div id="adminSection" class="section">
        <div class="admin-card">
            <h3>🔑 Customer Access Manager</h3>
            <div class="form-group">
                <input type="text" id="custName" placeholder="Customer Name">
                <input type="date" id="custExpiry" style="margin-top:10px;">
            </div>
            <button class="action-btn" onclick="addCustomer()">Add Customer</button>
            <div class="tag-list" id="customerList"></div>
        </div>

        <div class="admin-card">
            <h3>⚙️ Shop Settings</h3>
            <div class="form-group">
                <label>Shop Name:</label>
                <input type="text" id="setShopName" placeholder="e.g. Adarsh Collection">
            </div>
            <div class="form-group">
                <label>WhatsApp Number (with 91):</label>
                <input type="number" id="setWhatsapp" placeholder="e.g. 919876543210">
            </div>
            <div class="form-group">
                <label>Google Map Location Link:</label>
                <input type="text" id="setLocation" placeholder="Paste Map URL here">
            </div>
            <div class="form-group">
                <label>Create New Admin Password:</label>
                <input type="text" id="setAdminPassword" placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label>Customer View Button Message:</label>
                <input type="text" id="setCustomerBtnText" placeholder="e.g. Customer View">
            </div>
            <button class="action-btn" onclick="saveSettings()">Save Settings</button>
        </div>

        <div class="admin-card">
            <h3>🗂️ Create New Buttons</h3>            <div class="form-group">
                <input type="text" id="newCategory" placeholder="e.g. Toys or ₹100-₹200">
            </div>
            <button class="action-btn" onclick="addCategory()">Add Button</button>
            <div class="tag-list" id="adminCategoryList"></div>
        </div>

        <div class="admin-card">
            <h3>📤 Upload Multiple Items</h3>
            <div class="form-group">
                <label>Select Photos:</label>
                <input type="file" id="itemImage" accept="image/*" multiple>
            </div>
            <div class="form-group">
                <label>Select Button for these Items:</label>
                <select id="itemCategory"></select>
            </div>
            <button class="action-btn" id="uploadBtn" onclick="uploadProduct()">Upload All</button>
            <div id="uploadStatus" style="font-size: 13px; margin-top: 10px; display: none; font-weight: bold; color: var(--primary);"></div>
        </div>

        <div class="admin-card">
            <h3>🗑️ Manage / Edit Uploaded Items</h3>
            <div class="filters" id="adminFilters"></div>
            <div class="product-grid" id="adminProductGrid">
                <div class="empty-msg">Loading items...</div>
            </div>
            <button id="loadMoreAdminBtn" class="load-more-btn" style="display:none;" onclick="loadMoreAdmin()">Load More</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCux94PJgp707nVlgIfqCdox1rDOG9yZ0I",
          authDomain: "adarsh-collection.firebaseapp.com",
          databaseURL: "https://adarsh-collection-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "adarsh-collection",
          storageBucket: "adarsh-collection.firebasestorage.app",
          messagingSenderId: "650395998229",
          appId: "1:650395998229:web:9b8315d8d634328df3561c"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentAdmin = false;
        
        const urlParams = new URLSearchParams(window.location.search);
        const refName = urlParams.get('ref');

                db.ref('customers').on('value', (snap) => {
            const list = document.getElementById('customerList');
            if(list) list.innerHTML = '';
            let accessGranted = false;
            
            snap.forEach(c => {
                const data = c.val();
                if(list) list.innerHTML += `<div class="tag-item">${data.name} (Exp: ${data.expiry}) <span onclick="db.ref('customers/${c.key}').remove()">✖</span></div>`;
                
                // यहाँ कोड सिर्फ डेटाबेस चेक कर रहा है, कोई नाम हार्डकोडेड नहीं है
                if(refName === data.name && new Date() <= new Date(data.expiry)) {
                    accessGranted = true;
                }
            });
            
            // अब अगर आप एडमिन नहीं हैं और डेटाबेस में नाम नहीं मिला, तो एक्सेस डिनाई हो जाएगा
            if(!currentAdmin && !accessGranted) {
            document.body.innerHTML = `
    <div style="text-align:center; padding:50px;">
        <h1>🚫 Access Denied</h1>
        <p style="font-size: 18px; margin-top: 10px;">
            To view this website again, please contact <b style="color:#ff4d4d;">Adarsh&nbsp;Collection</b><br>
            <b style="color:#ff4d4d;">9291451252</b>
        </p>
    </div>
`;


            }
        });

        function addCustomer() {
            const name = document.getElementById('custName').value;
            const expiry = document.getElementById('custExpiry').value;
            if(name && expiry) db.ref('customers').push({name, expiry});
        }
        
        let appSettings = { shopName: "Adarsh Collection", whatsapp: "910000000000", locationUrl: "#", adminPassword: "1234", customerBtnText: "Customer View" };
        let allCategories = [];        let allProducts = [];
        let defaultCategory = "";
        let adminCurrentCategory = "";
        
        let displayedCount = 12;
        let adminDisplayedCount = 12;

        function openModal(imageSrc) {
            document.getElementById('modalImg').src = imageSrc;
            document.getElementById('imageModal').style.display = 'flex';
            history.pushState({modal: 'open'}, null, null);
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
            if (history.state && history.state.modal === 'open') {
                history.back();
            }
        }

        window.addEventListener('popstate', function(event) {
            if (document.getElementById('imageModal').style.display === 'flex') {
                closeModal();
            }
        });

        function verifyAdmin() {
            if (currentAdmin) { switchMode('admin'); return; }
            let pass = prompt("Enter Admin Password:");
            let correctPass = appSettings.adminPassword || "1234";
            if (pass === correctPass) { currentAdmin = true; switchMode('admin'); } 
            else if (pass !== null) { alert("❌ Incorrect Password!"); }
        }

        function switchMode(mode) {
            document.getElementById('btnCustomer').classList.remove('active');
            document.getElementById('btnAdmin').classList.remove('active');
            document.getElementById('customerSection').classList.remove('active');
            document.getElementById('adminSection').classList.remove('active');
            if(mode === 'admin') {
                document.getElementById('btnAdmin').classList.add('active');
                document.getElementById('adminSection').classList.add('active');
                if(adminCurrentCategory) setAdminFilter(adminCurrentCategory);
            } else {
                document.getElementById('btnCustomer').classList.add('active');
                document.getElementById('customerSection').classList.add('active');
                if(defaultCategory) filterProducts(defaultCategory);
            }
        }
        db.ref('appSettings').on('value', (snap) => {
            if(snap.val()) appSettings = Object.assign(appSettings, snap.val());
            document.getElementById('displayShopName').innerText = appSettings.shopName;
            document.getElementById('displayLocationUrl').href = appSettings.locationUrl;
            document.getElementById('setShopName').value = appSettings.shopName;
            document.getElementById('setWhatsapp').value = appSettings.whatsapp;
            document.getElementById('setLocation').value = appSettings.locationUrl;
            document.getElementById('setAdminPassword').value = appSettings.adminPassword;
            document.getElementById('setCustomerBtnText').value = appSettings.customerBtnText || "Customer View";
            document.getElementById('btnCustomer').innerText = appSettings.customerBtnText || "Customer View";
        });

        function saveSettings() {
            db.ref('appSettings').set({ shopName: document.getElementById('setShopName').value, whatsapp: document.getElementById('setWhatsapp').value, locationUrl: document.getElementById('setLocation').value, adminPassword: document.getElementById('setAdminPassword').value, customerBtnText: document.getElementById('setCustomerBtnText').value });
            alert("✅ Settings Saved Successfully!");
        }

        db.ref('categories').on('value', (snap) => {
            allCategories = [];
            const list = document.getElementById('adminCategoryList');
            const select = document.getElementById('itemCategory');
            list.innerHTML = ''; select.innerHTML = ''; 
            snap.forEach((child) => {
                const catName = child.val().name;
                allCategories.push({ key: child.key, name: catName });
                list.innerHTML += `<div class="tag-item">${catName} <span onclick="deleteCategory('${child.key}')">✖</span></div>`;
                select.innerHTML += `<option value="${catName}">${catName}</option>`;
            });
            if (allCategories.length > 0) {
                if(!allCategories.find(c => c.name === defaultCategory)) defaultCategory = allCategories[0].name;
                if(!allCategories.find(c => c.name === adminCurrentCategory)) adminCurrentCategory = allCategories[0].name;
            } else { defaultCategory = ""; adminCurrentCategory = ""; }
            renderCustomerFilters(); renderAdminFilters();
            if(!currentAdmin && defaultCategory) filterProducts(defaultCategory);
            else if(currentAdmin && adminCurrentCategory) setAdminFilter(adminCurrentCategory);
        });

        function addCategory() {
            const val = document.getElementById('newCategory').value.trim();
            if(val) { db.ref('categories').push({ name: val }); document.getElementById('newCategory').value = ''; }
        }

        function deleteCategory(key) { if(confirm("Are you sure you want to delete this button?")) db.ref('categories/' + key).remove(); }

        db.ref('catalogProducts').on('value', (snap) => {
            allProducts = [];
            snap.forEach((child) => { allProducts.push({ id: child.key, ...child.val() }); });
            allProducts.reverse();
            if(!currentAdmin) { if(defaultCategory) filterProducts(defaultCategory); } 
            else { if(adminCurrentCategory) setAdminFilter(adminCurrentCategory); }
        });
        async function uploadProduct() {
            const fileInput = document.getElementById('itemImage');
            const category = document.getElementById('itemCategory').value;
            const files = fileInput.files;
            if (files.length === 0) { alert("Please select photos!"); return; }
            if (!category) { alert("Please create a button first!"); return; }
            const statusDiv = document.getElementById('uploadStatus'); statusDiv.style.display = 'block';
            for (let i = 0; i < files.length; i++) {
                statusDiv.innerText = `Uploading ${i + 1} of ${files.length}...`;
                await processAndUpload(files[i], category);
            }
            alert("✅ All selected photos uploaded!"); statusDiv.style.display = 'none'; fileInput.value = '';
        }

        function processAndUpload(file, category) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = async function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 500; const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const base64Image = canvas.toDataURL('image/jpeg', 0.7);
                        await db.ref('catalogProducts').push({ imageUrl: base64Image, category: category, timestamp: Date.now() });
                        resolve();
                    }
                }
            });
        }

        function deleteProduct(id) { if(confirm("Delete this photo?")) db.ref('catalogProducts/' + id).remove(); }

        function editProduct(id, currentCategory) {
            let newCat = prompt("Enter new category name:", currentCategory);
            if(newCat) db.ref('catalogProducts/' + id).update({ category: newCat });
        }

        function downloadAndAskWhatsApp(dataUrl, shortId, waLink) {
            const a = document.createElement('a'); a.href = dataUrl; a.download = `Item_${shortId}.jpg`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => { window.open(waLink, '_blank'); }, 500);
        }

        function renderCustomerFilters() {
            const container = document.getElementById('customerFilters');
            container.innerHTML = '';
            allCategories.forEach(cat => {                const isActive = (cat.name === defaultCategory) ? 'active-filter' : '';
                container.innerHTML += `<button class="${isActive}" onclick="filterProducts('${cat.name}', this)">${cat.name}</button>`;
            });
        }

        function filterProducts(category, btnElement) {
            if(btnElement) { document.querySelectorAll('#customerFilters button').forEach(b => b.classList.remove('active-filter')); btnElement.classList.add('active-filter'); defaultCategory = category; }
            displayedCount = 12;
            renderCustomerGrid(true);
        }

        function renderCustomerGrid(isReset = false) {
            const grid = document.getElementById('productGrid');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (isReset) grid.innerHTML = '';
            let filtered = allProducts.filter(p => p.category === defaultCategory);
            
            let start = grid.children.length;
            let toShow = filtered.slice(start, displayedCount);
            
            toShow.forEach(product => {
                const waLink = `https://wa.me/${appSettings.whatsapp}`;
                grid.innerHTML += `<div class="product-card"><img src="${product.imageUrl}" onclick="openModal('${product.imageUrl}')"><div class="id-label">ID: ${product.id.slice(-6)}</div><button class="whatsapp-btn" onclick="downloadAndAskWhatsApp('${product.imageUrl}', '${product.id.slice(-6)}', '${waLink}')">⬇️ Download & WhatsApp</button></div>`;
            });
            
            loadMoreBtn.style.display = (filtered.length > grid.children.length) ? 'block' : 'none';
        }

        function loadMore() {
            displayedCount += 12;
            renderCustomerGrid(false);
        }

        function renderAdminFilters() {
            const container = document.getElementById('adminFilters');
            if(!container) return; container.innerHTML = '';
            allCategories.forEach(cat => {
                const isActive = (cat.name === adminCurrentCategory) ? 'active-filter' : '';
                container.innerHTML += `<button class="${isActive}" onclick="setAdminFilter('${cat.name}', this)">${cat.name}</button>`;
            });
        }

        function setAdminFilter(category, btnElement) {
            if(btnElement) { document.querySelectorAll('#adminFilters button').forEach(b => b.classList.remove('active-filter')); btnElement.classList.add('active-filter'); adminCurrentCategory = category; }
            adminDisplayedCount = 12;
            renderAdminGrid(true);
        }

        function renderAdminGrid(isReset = false) {
            const grid = document.getElementById('adminProductGrid');            const loadMoreAdminBtn = document.getElementById('loadMoreAdminBtn');
            if (isReset) grid.innerHTML = '';
            let filtered = allProducts.filter(p => p.category === adminCurrentCategory);
            
            let start = grid.children.length;
            let toShow = filtered.slice(start, adminDisplayedCount);
            
            toShow.forEach(product => {
                grid.innerHTML += `<div class="product-card"><img src="${product.imageUrl}" onclick="openModal('${product.imageUrl}')"><div class="id-label">ID: ${product.id.slice(-6)}</div><div class="btn-group"><button class="edit-btn" onclick="editProduct('${product.id}', '${product.category}')">✏️ Edit</button><button class="delete-btn" onclick="deleteProduct('${product.id}')">🗑️ Delete</button></div></div>`;
            });
            
            loadMoreAdminBtn.style.display = (filtered.length > grid.children.length) ? 'block' : 'none';
        }

        function loadMoreAdmin() {
            adminDisplayedCount += 12;
            renderAdminGrid(false);
        }
    </script>
</body>
</html>
